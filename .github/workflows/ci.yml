name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: |
            server/go.sum
            agent/go.sum
      - name: Vet
        run: go vet ./server/... ./agent/...
      - name: Test
        run: go test ./server/... ./agent/...
      - name: Build
        run: make build
      - name: Check gofmt
        run: |
          out=$(gofmt -l server agent)
          if [ -n "$out" ]; then echo "unformatted files:"; echo "$out"; exit 1; fi
