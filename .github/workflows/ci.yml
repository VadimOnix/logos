name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            server/go.sum
            agent/go.sum
      - name: Vet
        run: go vet ./server/... ./agent/...
      - name: Test
        run: go test ./server/... ./agent/...
      - name: Build
        run: make build
      - name: Check gofmt
        run: |
          out=$(gofmt -l server agent)
          if [ -n "$out" ]; then echo "unformatted files:"; echo "$out"; exit 1; fi

  # Cross-compile the agent for common OpenWrt targets and report binary
  # sizes against the PRD ≤1 MB budget (informational until the budget is met).
  agent-openwrt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: agent/go.sum
      - name: Install upx
        run: sudo apt-get update && sudo apt-get install -y upx-ucl
      - name: Cross-build agent
        run: |
          set -e
          mkdir -p dist
          build() {
            out="dist/logos-agent-$1"
            echo "building $out"
            env CGO_ENABLED=0 GOOS=linux "${@:2}" \
              go build -ldflags "-s -w" -trimpath -o "$out" ./agent/cmd/logos-agent
          }
          build mips_24kc    GOARCH=mips   GOMIPS=softfloat   # ath79, ramips (24Kc)
          build mipsel_24kc  GOARCH=mipsle GOMIPS=softfloat   # mt7621
          build arm_cortex-a7 GOARCH=arm   GOARM=7            # ipq40xx, bcm27xx
          build aarch64      GOARCH=arm64                     # mt7622, ipq807x, rockchip
          build x86_64       GOARCH=amd64
      - name: Size report
        run: |
          # Three columns matter for the flash budget: the raw stripped
          # binary, gzip (what an ipk/apk stores), and upx --lzma (the real
          # on-flash size if the binary is self-extracting). upx may not
          # support every target ELF — those fall back to "n/a".
          {
            echo "### logos-agent binary sizes (PRD budget: ≤ 1 MB flash)"
            echo ""
            echo "| target | raw | gzip | upx --lzma |"
            echo "|---|---|---|---|"
            for f in dist/logos-agent-*; do
              raw=$(stat -c%s "$f")
              gz=$(gzip -c "$f" | wc -c)
              cp "$f" "$f.upx"
              if upx --best --lzma -q "$f.upx" >/dev/null 2>&1; then
                up=$(numfmt --to=iec "$(stat -c%s "$f.upx")")
              else
                up="n/a"
              fi
              printf "| %s | %s | %s | %s |\n" "$(basename "$f")" \
                "$(numfmt --to=iec "$raw")" "$(numfmt --to=iec "$gz")" "$up"
            done
          } | tee -a "$GITHUB_STEP_SUMMARY"
