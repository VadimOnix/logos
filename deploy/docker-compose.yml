# Self-hosted Logos control plane (PRD F9): `docker compose up` from this
# directory brings up the server + Postgres. Set the admin credentials first:
#
#   cp .env.example .env   # then edit .env
#   docker compose up -d
#
# The panel is at http://localhost:8080. Put a TLS-terminating reverse proxy
# in front for anything beyond local evaluation.
services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080" # panel/API (put a TLS reverse proxy in front)
      - "8443:8443" # agent mTLS channel (terminates TLS itself — do NOT proxy-terminate)
    environment:
      LOGOS_DATABASE_URL: postgres://logos:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/logos
      LOGOS_ADMIN_EMAIL: ${LOGOS_ADMIN_EMAIL:-}
      LOGOS_ADMIN_PASSWORD: ${LOGOS_ADMIN_PASSWORD:-}
      LOGOS_LOG_LEVEL: ${LOGOS_LOG_LEVEL:-info}
      # Public name agents use for the mTLS channel; must resolve to this host.
      LOGOS_AGENT_HOST: ${LOGOS_AGENT_HOST:-localhost,127.0.0.1}
      LOGOS_AGENT_ENDPOINT: ${LOGOS_AGENT_ENDPOINT:-}
      # Node-offline alerts (F11); watcher is off until a sink is set.
      LOGOS_ALERT_WEBHOOK_URL: ${LOGOS_ALERT_WEBHOOK_URL:-}
      LOGOS_ALERT_OFFLINE_AFTER: ${LOGOS_ALERT_OFFLINE_AFTER:-}
      LOGOS_SMTP_ADDR: ${LOGOS_SMTP_ADDR:-}
      LOGOS_SMTP_FROM: ${LOGOS_SMTP_FROM:-}
      LOGOS_SMTP_TO: ${LOGOS_SMTP_TO:-}
      LOGOS_SMTP_USER: ${LOGOS_SMTP_USER:-}
      LOGOS_SMTP_PASSWORD: ${LOGOS_SMTP_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: logos
      POSTGRES_USER: logos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - logos-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logos -d logos"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  logos-db:
