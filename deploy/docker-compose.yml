# Self-hosted Logos control plane (PRD F9): `docker compose up` from this
# directory brings up the server + Postgres. Set the admin credentials first:
#
#   cp .env.example .env   # then edit .env
#   docker compose up -d
#
# The panel is at http://localhost:8080. For anything beyond local
# evaluation, front it with a TLS reverse proxy — see docker-compose.prod.yml
# for a ready-made Caddy overlay with automatic HTTPS.
services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      # Panel/API on loopback only — front it with a TLS reverse proxy
      # (see docker-compose.prod.yml, which reaches it over the internal
      # network). Same-machine access still works at http://localhost:8080;
      # to reach it directly from another host during evaluation, change
      # this to "8080:8080".
      - "127.0.0.1:8080:8080"
      - "8443:8443" # agent mTLS channel (terminates TLS itself — do NOT proxy-terminate)
    environment:
      LOGOS_DATABASE_URL: postgres://logos:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/logos
      LOGOS_ADMIN_EMAIL: ${LOGOS_ADMIN_EMAIL:-}
      LOGOS_ADMIN_PASSWORD: ${LOGOS_ADMIN_PASSWORD:-}
      LOGOS_LOG_LEVEL: ${LOGOS_LOG_LEVEL:-info}
      # Public name agents use for the mTLS channel; must resolve to this host.
      LOGOS_AGENT_HOST: ${LOGOS_AGENT_HOST:-localhost,127.0.0.1}
      LOGOS_AGENT_ENDPOINT: ${LOGOS_AGENT_ENDPOINT:-}
      # Node-offline alerts (F11); watcher is off until a sink is set.
      LOGOS_ALERT_WEBHOOK_URL: ${LOGOS_ALERT_WEBHOOK_URL:-}
      LOGOS_ALERT_OFFLINE_AFTER: ${LOGOS_ALERT_OFFLINE_AFTER:-}
      LOGOS_ALERT_DISK_PCT: ${LOGOS_ALERT_DISK_PCT:-}
      LOGOS_SMTP_ADDR: ${LOGOS_SMTP_ADDR:-}
      LOGOS_SMTP_FROM: ${LOGOS_SMTP_FROM:-}
      LOGOS_SMTP_TO: ${LOGOS_SMTP_TO:-}
      LOGOS_SMTP_USER: ${LOGOS_SMTP_USER:-}
      LOGOS_SMTP_PASSWORD: ${LOGOS_SMTP_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # /readyz returns 503 (non-zero exit for wget) while the DB is
      # unreachable, so the container is marked healthy only when it can serve.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: logos
      POSTGRES_USER: logos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - logos-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logos -d logos"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  logos-db:
